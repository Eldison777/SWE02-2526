<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word of the Day - Student Grade Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .word-card {
            border-left: 5px solid #0d6efd;
        }
        .phonetic {
            color: #6c757d;
            font-style: italic;
        }
        .part-of-speech {
            font-weight: bold;
            color: #0d6efd;
            text-transform: capitalize;
        }
        .definition-item {
            border-bottom: 1px solid #f0f0f0;
            padding: 8px 0;
        }
        .definition-item:last-child {
            border-bottom: none;
        }
        .example-text {
            color: #6c757d;
            font-style: italic;
            font-size: 0.9rem;
        }
        #loadingSpinner {
            display: none;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class="navbar-brand mb-0 h1" href="index.html">Student Grade Tracker</a>
            <span class="navbar-text text-white">Word of the Day</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">

            
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title">Search a Word</h5>
                        <div class="input-group">
                            <input type="text" class="form-control" id="wordInput" placeholder="Enter any word..." />
                            <button class="btn btn-primary" id="searchBtn">Search</button>
                        </div>
                    </div>
                </div>

               
                <div class="text-center my-4" id="loadingSpinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 text-muted">Fetching definition...</p>
                </div>

                
                <div class="alert alert-danger d-none" id="errorMsg"></div>

              
                <div class="card word-card d-none" id="wordCard">
                    <div class="card-body">
                        <h2 id="wordTitle" aria-live="polite">Word</h2>
                        <span class="phonetic" id="wordPhonetic"></span>
                        <p class="part-of-speech mt-2" id="partOfSpeech"></p>
                        <p id="definition"></p>
                        <p class="example-text" id="example"></p>
                    </div>
                </div>

               
                <p class="text-center text-muted mt-4">
                    Today's suggested word: <strong id="dailyWordHint"></strong> — or search any word above!
                </p>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="scripts/classwork.js"></script>
</body>
</html>
